services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: varzeapro
      POSTGRES_USER: varzeapro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-varzeapro_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varzeapro"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

