name: Test
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: varzeapro_test
          POSTGRES_USER: varzeapro
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U varzeapro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Projeto/apps/api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: Projeto/apps/api
      - run: pnpm drizzle-kit migrate
        working-directory: Projeto/apps/api
        env:
          DATABASE_URL: postgresql://varzeapro:test_password@localhost:5432/varzeapro_test
      - run: pnpm test
        working-directory: Projeto/apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://varzeapro:test_password@localhost:5432/varzeapro_test
          JWT_SECRET: test-secret-that-is-at-least-32-characters-long
          BETTER_AUTH_SECRET: test-better-auth-secret-long-enough-32chars
          BETTER_AUTH_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:5173
