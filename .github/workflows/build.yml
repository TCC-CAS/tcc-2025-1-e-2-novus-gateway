name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Projeto/apps/api/package-lock.json
      - run: npm ci
        working-directory: Projeto/apps/api
      - run: npm run build
        working-directory: Projeto/apps/api

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f Projeto/docker-compose.yml build
