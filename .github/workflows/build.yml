name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Projeto/apps/api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: Projeto/apps/api
      - run: pnpm run build
        working-directory: Projeto/apps/api

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f Projeto/docker-compose.yml build
